name: CI

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'ci:')"
    
    permissions:
      packages: write
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Gateway service
        run: |
          docker build -t ghcr.io/kage-ops-dev/quickticket-gateway:${{ github.sha }} ./app/gateway
          docker push ghcr.io/kage-ops-dev/quickticket-gateway:${{ github.sha }}

      - name: Build and push Events service
        run: |
          docker build -t ghcr.io/kage-ops-dev/quickticket-events:${{ github.sha }} ./app/events
          docker push ghcr.io/kage-ops-dev/quickticket-events:${{ github.sha }}

      - name: Build and push Payments service
        run: |
          docker build -t ghcr.io/kage-ops-dev/quickticket-payments:${{ github.sha }} ./app/payments
          docker push ghcr.io/kage-ops-dev/quickticket-payments:${{ github.sha }}

      - name: Update image tags in manifests
        run: |
          SHA=${{ github.sha }}
          sed -i "s|image: ghcr.io/.*/quickticket-gateway:.*|image: ghcr.io/${{ github.actor }}/quickticket-gateway:${SHA}|" k8s/chart/templates/gateway.yaml
          sed -i "s|image: ghcr.io/.*/quickticket-events:.*|image: ghcr.io/${{ github.actor }}/quickticket-events:${SHA}|" k8s/chart/templates/events.yaml
          sed -i "s|image: ghcr.io/.*/quickticket-payments:.*|image: ghcr.io/${{ github.actor }}/quickticket-payments:${SHA}|" k8s/chart/templates/payments.yaml

      - name: Commit and push manifest update
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -f k8s/
          git diff --cached --quiet || git commit -m "ci: update image tags to ${{ github.sha }}"
          git push