apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
      - name: gateway
        image: ghcr.io/kage-ops-dev/quickticket-gateway:dfe86fb20a532ded6cac4b168a2f0089a809d57b
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: EVENTS_URL
          value: "http://events:8081"
        - name: PAYMENTS_URL
          value: "http://payments:8082"
        - name: GATEWAY_TIMEOUT_MS
          value: "5000"
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: gateway